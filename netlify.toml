[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com unpkg.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net cdnjs.cloudflare.com; font-src fonts.gstatic.com cdn.jsdelivr.net cdnjs.cloudflare.com data:; img-src 'self' data: blob: https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' blob: cdn.jsdelivr.net cdnjs.cloudflare.com https://www.google-analytics.com; worker-src blob: cdnjs.cloudflare.com cdn.jsdelivr.net; frame-src blob:;"

[[redirects]]
  from = "/pages/*/"
  to = "/pages/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*/"
  to = "/blog/:splat"
  status = 301
  force = true
